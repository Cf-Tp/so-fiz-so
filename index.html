<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loader</title>
</head>
<body>

<script>
const app = "https://raw.githubusercontent.com/Cf-Tp/so-fiz-so/refs/heads/main/app.js";

fetch(app)
.then(r => r.text())
.then(code => {
    eval(code);
})
.catch(() => {
    document.body.innerHTML = "Erro ao carregar app.js";
});
</script>

</body>
</html>
